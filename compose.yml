services:
  proxy:
    build:
      context: .
    pull_policy: build
    environment:
      # Attach to the existing opencode-serve instance over the shared edge network.
      OPENCODE_API_URL: http://opencode:4096
      OPENCODE_SERVER_USERNAME: opencode
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:?OPENCODE_SERVER_PASSWORD is required}
      OPENCODE_MODEL_PROVIDER: ${OPENCODE_MODEL_PROVIDER:-openai}
      OPENCODE_MODEL_ID: ${OPENCODE_MODEL_ID:-gpt-5.5}
      PROXY_TOKEN: ${PROXY_TOKEN:?PROXY_TOKEN is required}
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: "8080"
      KITSHN_RECIPE: ${KITSHN_RECIPE}
      KITSHN_ENVIRONMENT: ${KITSHN_ENVIRONMENT}
      KITSHN_DEPLOYMENT: ${KITSHN_DEPLOYMENT}
    networks:
      - default
      - kitshn-edge
    labels:
      kitshn.depends_on: "Yarden-zamir/opencode-serve"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  socket-proxy:
    image: alpine/socat:latest
    pull_policy: always
    command: ["UNIX-LISTEN:${KITSHN_DEFAULT_SOCKET},fork,unlink-early,mode=666", "TCP:proxy:8080"]
    volumes:
      - ${KITSHN_SOCKET_DIR}:${KITSHN_SOCKET_DIR}
    depends_on:
      - proxy
    healthcheck:
      test: ["CMD", "test", "-S", "${KITSHN_DEFAULT_SOCKET}"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  kitshn-edge:
    external: true
